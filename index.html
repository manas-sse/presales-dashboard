<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SolarSquare — Pre-Sales</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#f4f4f0;--sur:#fff;--sur2:#f7f7f4;--bd:rgba(0,0,0,.08);--bd2:rgba(0,0,0,.15);
  --tx:#18181a;--t2:#5c5c62;--t3:#9b9b9f;
  --bl:#1a56db;--bll:#dbeafe;--bld:#1240a8;
  --gn:#166534;--gnl:#dcfce7;--rd:#991b1b;--rdl:#fee2e2;--am:#92400e;--aml:#fef3c7;
  --r:8px;--rl:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow:hidden}

.topbar{background:#0f0f10;color:#fff;height:50px;padding:0 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;z-index:400;flex-shrink:0}
.logo{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500;white-space:nowrap}
.logo-mark{width:24px;height:24px;border-radius:5px;background:linear-gradient(135deg,#f59e0b,#ef4444);display:grid;place-items:center;font-size:9px;font-weight:700;color:#fff}
.logo-div{color:rgba(255,255,255,.2);margin:0 3px}
.logo-sub{font-weight:300;color:rgba(255,255,255,.4);font-size:11px}
.topbar-r{display:flex;align-items:center;gap:8px;flex-shrink:0}
#upd-lbl{font-size:10px;color:rgba(255,255,255,.3);font-family:'DM Mono',monospace}
.data-pill{background:rgba(245,158,11,.15);color:#f59e0b;font-size:10px;font-weight:500;padding:3px 9px;border-radius:20px;font-family:'DM Mono',monospace}
.rbtn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.7);padding:5px 12px;border-radius:6px;cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif}
.rbtn:hover{background:rgba(255,255,255,.16)}

.shell{display:flex;height:calc(100vh - 50px);overflow:hidden}
.sidebar{width:196px;background:var(--sur);border-right:1px solid var(--bd);padding:10px 0;flex-shrink:0;overflow-y:auto}
.sh{font-size:9px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--t3);padding:12px 14px 4px}
.ni{display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;font-size:12px;color:var(--t2);border-left:2px solid transparent;transition:all .1s}
.ni:hover{background:var(--sur2);color:var(--tx)}
.ni.active{background:#eef2ff;color:var(--bl);border-left-color:var(--bl);font-weight:500}
.ni .ico{font-size:11px;opacity:.55;width:13px;text-align:center;flex-shrink:0}
.ni.preview{opacity:.55}
.ni.preview::after{content:'preview';margin-left:auto;font-size:8px;background:#fef3c7;color:#92400e;padding:1px 5px;border-radius:6px}
.mob-nav{display:none;background:var(--sur);border-bottom:1px solid var(--bd);padding:0 10px;overflow-x:auto;white-space:nowrap;scrollbar-width:none;flex-shrink:0}
.mob-nav::-webkit-scrollbar{display:none}
.mob-tab{display:inline-block;padding:9px 11px;font-size:12px;color:var(--t2);cursor:pointer;border-bottom:2px solid transparent;font-weight:500}
.mob-tab.active{color:var(--bl);border-bottom-color:var(--bl)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.sticky-hdr{background:var(--sur);border-bottom:1px solid var(--bd);padding:9px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.tab-name{font-size:13px;font-weight:600;color:var(--tx);border-left:3px solid var(--bl);padding-left:8px;white-space:nowrap}
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.panel{display:none;padding:16px}
.panel.active{display:block}

.fb{background:var(--sur);border:1px solid var(--bd);border-radius:var(--rl);padding:12px 14px;margin-bottom:12px}
.fr{display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap}
.fr+.fr{margin-top:10px;padding-top:10px;border-top:1px dashed var(--bd)}
.flbl{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;display:block}
.flbl .sub{font-weight:400;color:var(--t3);text-transform:none;letter-spacing:0;font-size:10px;margin-left:4px}
.fg{display:flex;flex-direction:column;min-width:0}
.frow{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
select.fc,input.fc{font-size:12px;padding:5px 8px;border:1px solid var(--bd2);border-radius:6px;background:var(--sur);color:var(--tx);font-family:'DM Sans',sans-serif;cursor:pointer}
select.fc:focus,input.fc:focus{outline:2px solid var(--bl);outline-offset:-1px}
input[type=date].fc{padding:4px 7px;min-width:124px}
input[type=number].fc{width:80px}
.fi{font-size:11px;color:var(--t3);white-space:nowrap}

.ms-wrap{position:relative;min-width:155px}
.ms-btn{width:100%;padding:5px 26px 5px 9px;border:1px solid var(--bd2);border-radius:6px;background:var(--sur);color:var(--tx);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;text-align:left;position:relative;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ms-btn::after{content:'▾';position:absolute;right:8px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:10px}
.ms-dd{display:none;position:absolute;top:calc(100% + 4px);left:0;min-width:230px;background:var(--sur);border:1px solid var(--bd2);border-radius:10px;box-shadow:0 6px 24px rgba(0,0,0,.12);z-index:600}
.ms-dd.open{display:flex;flex-direction:column}
.ms-list{max-height:240px;overflow-y:auto;padding:6px 0}
.ms-opt{display:flex;align-items:center;gap:8px;padding:6px 12px;font-size:12px;cursor:pointer;color:var(--tx)}
.ms-opt:hover{background:var(--sur2)}
.ms-opt input[type=checkbox]{accent-color:var(--bl);width:13px;height:13px;flex-shrink:0;cursor:pointer}
.ms-sep{border-top:1px solid var(--bd);margin:2px 0}
.ms-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ms-foot{padding:8px 10px;border-top:1px solid var(--bd);display:flex;justify-content:flex-end;gap:6px;background:var(--sur2)}
.ms-apply{padding:5px 14px;background:var(--bl);color:#fff;border:none;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.ms-apply:hover{background:var(--bld)}
.ms-clear{padding:5px 10px;background:transparent;color:var(--t2);border:1px solid var(--bd2);border-radius:6px;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif}

.tgl{display:flex;border:1px solid var(--bd2);border-radius:6px;overflow:hidden;flex-shrink:0}
.tgl-b{padding:5px 12px;font-size:11px;font-weight:500;background:var(--sur);color:var(--t2);border:none;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap}
.tgl-b+.tgl-b{border-left:1px solid var(--bd2)}
.tgl-b.on{background:var(--bl);color:#fff}
.comp-btn{padding:5px 12px;font-size:11px;font-weight:500;background:var(--sur2);color:var(--t2);border:1px solid var(--bd2);border-radius:6px;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap}
.comp-btn.on{background:#ede9fe;color:#5b21b6;border-color:#c4b5fd}
.ptag{display:inline-flex;align-items:center;padding:1px 7px;border-radius:20px;font-size:10px;font-weight:600;margin-right:3px}
.pa{background:#dbeafe;color:#1e40af}.pb{background:#ede9fe;color:#5b21b6}

.kgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:12px}
.kgrid.k4{grid-template-columns:repeat(4,1fr)}
.kcard{background:var(--sur);border:1px solid var(--bd);border-radius:var(--rl);padding:12px 14px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.kcard.cmp{border-top:3px solid #8b5cf6}
.kl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--t3);margin-bottom:5px}
.kv{font-size:22px;font-weight:600;font-family:'DM Mono',monospace;letter-spacing:-1px;line-height:1;margin-bottom:2px}
.ks{font-size:10px;color:var(--t3)}
.kcrow{display:flex;gap:10px;margin-top:3px}
.ka{font-size:12px;font-family:'DM Mono',monospace;color:#1e40af;font-weight:600}
.kb{font-size:12px;font-family:'DM Mono',monospace;color:#5b21b6;font-weight:600}
.kdelta{font-size:10px;padding:1px 5px;border-radius:8px}
.du{background:var(--gnl);color:var(--gn)}.dd{background:var(--rdl);color:var(--rd)}.dn{background:var(--sur2);color:var(--t2)}
.cb{color:var(--bl)}.cg{color:var(--gn)}.ca{color:var(--am)}.cr{color:var(--rd)}.cp{color:#7c3aed}

.sc{background:var(--sur);border:1px solid var(--bd);border-radius:var(--rl);box-shadow:0 1px 3px rgba(0,0,0,.05);margin-bottom:12px;overflow:hidden}
.sc-h{padding:11px 15px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.sc-t{font-size:12px;font-weight:600}
.sc-hi{font-size:10px;color:var(--t3)}
.sc-b{padding:14px 15px}
.cw{height:310px;position:relative}

.tw{overflow-x:auto}
.tw table{width:100%;border-collapse:collapse;font-size:11px}
.tw thead tr:first-child th{background:#1e293b;color:#f1f5f9;padding:6px 8px;font-size:10px;font-weight:600;text-align:center;border-right:1px solid #334155;white-space:normal;line-height:1.25;word-wrap:break-word}
.tw thead tr:first-child th:first-child,.tw thead tr:first-child th.row-hdr{background:#eef2ff;color:#3730a3;text-align:left}
.tw thead tr:last-child th{background:#eef2ff;color:#3730a3;padding:6px 8px;font-weight:700;font-size:9px;text-transform:uppercase;letter-spacing:.3px;border-bottom:2px solid #c7d2fe;white-space:normal;line-height:1.25;text-align:right;position:sticky;top:0;z-index:1;vertical-align:bottom;word-wrap:break-word;min-width:60px;max-width:120px}
.tw thead tr:last-child th:first-child,.tw thead tr:last-child th.row-hdr{text-align:left;min-width:90px;max-width:160px}
.tw thead.single tr th{background:#eef2ff;color:#3730a3;padding:6px 8px;font-weight:700;font-size:9px;text-transform:uppercase;letter-spacing:.3px;border-bottom:2px solid #c7d2fe;white-space:normal;line-height:1.25;text-align:right;position:sticky;top:0;z-index:1;vertical-align:bottom;word-wrap:break-word;min-width:60px;max-width:160px}
.tw thead.single tr th:first-child{text-align:left;min-width:100px;max-width:200px}
.tw tbody td{padding:5px 8px;border-bottom:1px solid var(--bd);vertical-align:middle;white-space:nowrap}
.tw tbody tr:last-child td{border-bottom:none}
.tw tbody tr:hover td{background:var(--sur2)}
.tdc{font-weight:500;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.td-lrm{font-size:10px;color:var(--t2);padding-left:18px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tdr{text-align:right}
.tdt{text-align:right;font-weight:600;background:var(--bll);color:var(--bl)}
.tdb{text-align:right;font-weight:600;background:#ede9fe;color:#5b21b6}
.tddu{color:var(--gn);font-size:10px}.tddd{color:var(--rd);font-size:10px}
.mono{font-family:'DM Mono',monospace}
.tw thead th.sortable{cursor:pointer;user-select:none}
.tw thead th.sortable:hover{filter:brightness(.95)}
.tw thead th.sort-asc::after{content:' ↑'}
.tw thead th.sort-desc::after{content:' ↓'}
.cell-warn{background:#fef3c7;color:#92400e;font-weight:600}
.cell-bad{background:#fee2e2;color:#991b1b;font-weight:600}
.cell-good{background:#dcfce7;color:#166534;font-weight:600}

.stb{display:flex;flex-direction:column;align-items:center;justify-content:center;height:180px;gap:10px;color:var(--t2);font-size:12px}
.spin{width:20px;height:20px;border:2px solid var(--bd2);border-top-color:var(--bl);border-radius:50%;animation:sp .6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.err{background:var(--rdl);border:1px solid #fca5a5;border-radius:var(--r);padding:14px;color:var(--rd);font-size:12px;line-height:1.7}
.nd{padding:24px;text-align:center;color:var(--t3);font-size:12px}

/* PREVIEW SKELETON */
.preview-banner{background:linear-gradient(90deg,#fef3c7,#fde68a);border:1px solid #f59e0b;border-radius:var(--rl);padding:14px 18px;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.preview-banner .icon{font-size:18px}
.preview-banner b{color:#92400e;font-size:13px}
.preview-banner p{font-size:11px;color:#78350f;margin:2px 0 0 0}
.skeleton-card{background:var(--sur);border:1px dashed var(--bd2);border-radius:var(--rl);padding:18px;margin-bottom:12px}
.skeleton-row{height:14px;background:linear-gradient(90deg,#e2e8f0,#f1f5f9,#e2e8f0);background-size:200% 100%;border-radius:4px;margin-bottom:8px;animation:shimmer 1.4s linear infinite}
.skeleton-row.w-50{width:50%}.skeleton-row.w-70{width:70%}.skeleton-row.w-90{width:90%}.skeleton-row.w-30{width:30%}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

@media(max-width:960px){.kgrid,.kgrid.k4{grid-template-columns:repeat(3,1fr)}}
@media(max-width:720px){
  .sidebar{display:none}.mob-nav{display:block}
  .kgrid,.kgrid.k4{grid-template-columns:repeat(2,1fr)}
  .panel{padding:10px}.topbar-r .data-pill{display:none}
}
@media(max-width:420px){.kgrid,.kgrid.k4{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo"><div class="logo-mark">SS</div>SolarSquare<span class="logo-div">|</span><span class="logo-sub">Pre-Sales</span></div>
  <div class="topbar-r">
    <div class="data-pill" id="data-pill">—</div>
    <div id="upd-lbl">—</div>
    <button class="rbtn" onclick="loadData()">↺ Refresh</button>
  </div>
</div>

<div class="shell">
  <nav class="sidebar">
    <div class="sh">Lead state</div>
    <div class="ni active" data-tab="v1"><span class="ico">⊞</span>Cluster × Stage</div>
    <div class="ni" data-tab="calls"><span class="ico">☎</span>Call Attempts</div>
    <div class="sh">Movement</div>
    <div class="ni" data-tab="movement"><span class="ico">⇄</span>Daily Movement</div>
    <div class="ni" data-tab="lrm"><span class="ico">◐</span>LRM Performance</div>
    <div class="ni" data-tab="tat"><span class="ico">⌛</span>TAT</div>
    <div class="sh">Analytics</div>
    <div class="ni" data-tab="funnel"><span class="ico">▽</span>Stage Funnel</div>
    <div class="ni" data-tab="cohort"><span class="ico">⊟</span>Cohort</div>
    <div class="sh">Coming soon</div>
    <div class="ni preview" data-tab="quality"><span class="ico">⚑</span>Quality Check</div>
  </nav>

  <div class="main">
    <div class="mob-nav">
      <span class="mob-tab active" data-tab="v1">Cluster×Stage</span>
      <span class="mob-tab" data-tab="calls">Calls</span>
      <span class="mob-tab" data-tab="movement">Movement</span>
      <span class="mob-tab" data-tab="lrm">LRM</span>
      <span class="mob-tab" data-tab="tat">TAT</span>
      <span class="mob-tab" data-tab="funnel">Funnel</span>
      <span class="mob-tab" data-tab="cohort">Cohort</span>
      <span class="mob-tab" data-tab="quality">Quality</span>
    </div>
    <div class="sticky-hdr"><span class="tab-name" id="tab-name">Cluster × Stage</span></div>
    <div class="scroll-area" id="scroll-area">
      <div id="p-v1"       class="panel active"><div class="stb"><div class="spin"></div>Loading…</div></div>
      <div id="p-calls"    class="panel"></div>
      <div id="p-movement" class="panel"></div>
      <div id="p-lrm"      class="panel"></div>
      <div id="p-tat"      class="panel"></div>
      <div id="p-funnel"   class="panel"></div>
      <div id="p-cohort"   class="panel"></div>
      <div id="p-quality"  class="panel"></div>
    </div>
  </div>
</div>

<script>
'use strict';

// ── STATUS HIERARCHY ─────────────────────────────────────────────────────────
const STATUS_STAGE_MAP = {
  'Open':            ['Call Later','Assigned','Meeting Scheduled (BD)','Call Not Connected','New Opportunity','Qualification in Progress','Open-Assigned','Presales','Language Issue','Call Later (Under Construction)','Call Later (Interested)','Open-Call Not Connected','Duplicate Opportunity','Already Spoken','Meet Later (Qualified)','Language Barrier','Need Payment Details','Qualification in progress'],
  'Connected':       ['Meeting Confirmed - Customer Home','Speed Order','DEV Scheduled','DEV Done','Design Created','Meeting Postponed','DEV Postponed'],
  'Booked':          ['Booking Processing','Booking Pending by ZSM','Booking Pending by Cx','Verification Rejected','Pending Verification','Booking Rejected by ZSM','Booking Rejected by Cx'],
  'Closed - Lost':   ['Lead - Not Qualified','Lead - Not Interested','Meeting - Not Qualified','Meeting - Not Interested','Meeting - Not Inteterested','Lost to Competitor','Meeting Done - Customer Not Reachable','Assigned'],
  'Closed - Cold':   ['Future Followup Required','Lead - Not Interested','Inactive Lead','Assigned'],
  'Meeting':         ['Meeting Done - Hot','Meeting Done - Moderate','Followup On Call','Meeting Done - Customer Not Reachable','On-Hold','Followup At Home','Followup Rescheduled'],
  'Prequalification':['Qualification In Progress','Lost In Qualification','Qualification Remaining','Assigned','New Lead','Language Issue'],
  'Closed - Won':    ['Order Confirmed'],
  'Lost':            ['SIQ - Opportunity Remaining','SIQ - Opportunity Exhausted','Not Interested in Solar','Lost to Competitor','Non Qualified - Roof Area Insufficient','Not Serviceable - SSE not in location','Wrong Number','Number Does Not Exist','Duplicate Opportunity','Not Serviceable - Offgrid Enquiry','Not Interested','Non Qualified - Bill Amount Insufficient','Cold','Non Qualified - No Roof Ownership','Not Solar Enquiry - Vendor / Franchisee','SIQ - Remaining','lost to competitor','Non Qualified - Not Govt Meter','Housing Society Enquiry','Not Solar Enquiry - SolarPro Enquiry','Commercial Lead','Non Qualified - Roof Not Fit for Solar','Meter Connection Not Yet Available','DNC Lead: Outreach Stopped']
};
const STATUS_ORDER = ['Open','Connected','Booked','Closed - Lost','Closed - Cold','Meeting','Prequalification','Closed - Won','Lost'];
const STATUS_COLORS = {'Open':'#3b82f6','Connected':'#10b981','Prequalification':'#6366f1','Meeting':'#f59e0b','Booked':'#8b5cf6','Closed - Won':'#22c55e','Closed - Lost':'#ef4444','Closed - Cold':'#94a3b8','Lost':'#f97316','Unknown':'#64748b'};
const STATUS_BG = {'Open':'#eff6ff','Connected':'#f0fdf4','Prequalification':'#eef2ff','Meeting':'#fffbeb','Booked':'#f5f3ff','Closed - Won':'#f0fdf4','Closed - Lost':'#fef2f2','Closed - Cold':'#f8fafc','Lost':'#fff7ed','Unknown':'#f8fafc'};

// ── STATE ────────────────────────────────────────────────────────────────────
let DATA=null, CALLS=null, MOVE=null, EOD=null, LRM_DATA=null, TAT_DATA=null;
let curTab='v1', rendered={}, charts={};
let V1={sel:[],comp:false,pct:false};
let CV={sel:['Open'],stageSel:'all'};
let FN={sel:[]};
let MV={mode:'transitions',level:'stage',preset:'yesterday',cluster:'all',lrm:'all',fromStage:'all',toStage:'all'};
let LRMV={preset:'last7',cluster:'all',lrm:'all'};
let TATV={metric:'tat_first_call',percentile:50,cluster:'all',lrm:'all',preset:'last30'};

// ── HELPERS ──────────────────────────────────────────────────────────────────
const $=id=>document.getElementById(id);
const f=n=>(n==null||isNaN(n))?'—':Math.round(n).toLocaleString('en-IN');
const fdec=(n,d=1)=>(n==null||isNaN(n))?'—':Number(n).toFixed(d);
const pct=(a,b)=>b?((a/b)*100).toFixed(1)+'%':'—';

const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function fmtNice(yyyymmdd){
  if(!yyyymmdd)return'—';
  const m=String(yyyymmdd).match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(!m)return yyyymmdd;
  return`${m[3]}-${MONTHS[parseInt(m[2])-1]}-${m[1]}`;
}
function fmtD(d){if(!d)return'';return[d.getFullYear(),String(d.getMonth()+1).padStart(2,'0'),String(d.getDate()).padStart(2,'0')].join('-');}
const sd=d=>{const r=new Date(d);r.setHours(0,0,0,0);return r;};
const ed=d=>{const r=new Date(d);r.setHours(23,59,59,999);return r;};
const da=n=>{const d=new Date();d.setDate(d.getDate()-n);return d;};

function presetRange(p){
  const now=new Date();
  const dow=now.getDay(),diff=(dow===0?-6:1)-dow;
  const ws=new Date(now);ws.setDate(now.getDate()+diff);
  const lws=new Date(ws);lws.setDate(lws.getDate()-7);
  const lwe=new Date(ws);lwe.setDate(lwe.getDate()-1);
  const ms=new Date(now.getFullYear(),now.getMonth(),1);
  const lms=new Date(now.getFullYear(),now.getMonth()-1,1);
  const lme=new Date(now.getFullYear(),now.getMonth(),0);
  const ys=new Date(now.getFullYear(),0,1);
  const map={today:[sd(now),ed(now)],yesterday:[sd(da(1)),ed(da(1))],last7:[sd(da(6)),ed(now)],last30:[sd(da(29)),ed(now)],thisweek:[sd(ws),ed(now)],lastweek:[sd(lws),ed(lwe)],thismonth:[sd(ms),ed(now)],lastmonth:[sd(lms),ed(lme)],last3mo:[sd(da(89)),ed(now)],thisyear:[sd(ys),ed(now)],alltime:[new Date('2025-01-01'),ed(now)]};
  return map[p]||[sd(da(29)),ed(now)];
}

function getDR(presetId,fromId,toId){
  const preset=$(presetId)?.value||'last30';
  if(preset!=='custom'){
    const[from,to]=presetRange(preset);
    if($(fromId))$(fromId).value=fmtD(from);
    if($(toId))$(toId).value=fmtD(to);
    return{from,to};
  }
  const fv=$(fromId)?.value,tv=$(toId)?.value;
  return{from:fv?new Date(fv+'T00:00:00'):null,to:tv?new Date(tv+'T23:59:59'):null};
}

function filterDR(recs,from,to){
  if(!from&&!to)return recs;
  // Use local-time date strings to avoid UTC offset issues (IST = +5:30)
  const lStr=d=>[d.getFullYear(),String(d.getMonth()+1).padStart(2,'0'),String(d.getDate()).padStart(2,'0')].join('-');
  const fromS=from?lStr(from):null;
  const toS=to?lStr(to):null;
  return recs.filter(r=>{
    // Prefer exact creation_date; fall back to cohort_week for backwards compat
    const ds=r.creation_date&&r.creation_date!=='Unknown'?r.creation_date:r.cohort_week;
    if(!ds||ds==='Unknown')return false;
    if(fromS&&ds<fromS)return false;
    if(toS&&ds>toS)return false;
    return true;
  });
}

// Filter audit-derived records by date (records have a "date" field as YYYY-MM-DD)
function filterByDate(recs,from,to){
  if(!from&&!to)return recs;
  return recs.filter(r=>{
    const d=new Date(r.date+'T00:00:00');
    if(from&&d<from)return false;
    if(to&&d>to)return false;
    return true;
  });
}

// ── COMMON DATA HELPERS ──────────────────────────────────────────────────────
function aggPivot(records,dimField){
  const pivot={},rowTotals={},dimTotals={};
  records.forEach(r=>{
    const row=r.cluster||'Unknown';
    const dim=r[dimField]||'Unknown';
    const n=r.lead_count||0;
    pivot[row]=pivot[row]||{};pivot[row][dim]=(pivot[row][dim]||0)+n;
    rowTotals[row]=(rowTotals[row]||0)+n;
    dimTotals[dim]=(dimTotals[dim]||0)+n;
  });
  return{pivot,rowTotals,dimTotals};
}
function topClusters(aggA,aggB,n=20){
  const s=new Set([...Object.keys(aggA.rowTotals),...(aggB?Object.keys(aggB.rowTotals):[])]);
  s.delete('Unknown');
  return[...s].sort((a,b)=>(aggA.rowTotals[b]||0)-(aggA.rowTotals[a]||0)).slice(0,n);
}
function stageGroups(allDimTotals,selStatuses){
  const statusList=selStatuses?.length>0?selStatuses:STATUS_ORDER;
  const groups=[],assigned=new Set();
  statusList.forEach(status=>{
    const canonical=STATUS_STAGE_MAP[status]||[];
    const matched=[];
    canonical.forEach(canon=>{
      const key=Object.keys(allDimTotals).find(k=>k.toLowerCase().trim()===canon.toLowerCase().trim());
      if(key&&!assigned.has(key)){matched.push(key);assigned.add(key);}
    });
    if(matched.length>0)groups.push({status,stages:matched});
  });
  const unassigned=Object.keys(allDimTotals).filter(k=>!assigned.has(k));
  if(unassigned.length>0)groups.push({status:'Unknown',stages:unassigned});
  return groups;
}
function buildColors(groups){
  const colors={};
  groups.forEach(({status,stages})=>{
    const hex=STATUS_COLORS[status]||'#94a3b8';
    const[r,g,b]=hexRgb(hex);
    const n=stages.length;
    stages.forEach((stage,i)=>{
      const a=n<=1?0.88:0.92-(i/Math.max(n-1,1))*0.48;
      colors[stage]=`rgba(${r},${g},${b},${a.toFixed(2)})`;
    });
  });
  return colors;
}
function hexRgb(hex){const h=hex.replace('#','');return[parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
function dimAlpha(rgba,factor=0.55){return rgba.replace(/rgba\((\d+),(\d+),(\d+),([\d.]+)\)/,(_,r,g,b,a)=>`rgba(${r},${g},${b},${(parseFloat(a)*factor).toFixed(2)})`);}
function hBg(v,max){if(!v||!max)return'';return`background:rgba(59,130,246,${((v/max)*0.38+0.05).toFixed(2)})`;}
function dHtml(a,b){
  if(b==null)return'';
  const d=a-b,p=b>0?Math.round((d/b)*100):null; // A−B: positive = current(A) > baseline(B) = good
  if(d===0)return'<span class="dn">—</span>';
  const cls=d>0?'du':'dd',arr=d>0?'↑':'↓';
  return`<span class="${cls}">${arr}${p!=null?Math.abs(p)+'%':''}</span>`;
}

// Sortable table — uses last-row of thead as header
function makeSortable(tbl){
  if(!tbl||tbl.dataset.s)return;tbl.dataset.s='1';
  const thead=tbl.querySelector('thead');if(!thead)return;
  const rows=thead.querySelectorAll('tr');
  const headers=rows[rows.length-1].querySelectorAll('th');
  headers.forEach((th,ci)=>{
    th.classList.add('sortable');
    th.addEventListener('click',()=>{
      const asc=th.dataset.d!=='asc';
      headers.forEach(h=>{h.dataset.d='';h.classList.remove('sort-asc','sort-desc');});
      th.dataset.d=asc?'asc':'desc';
      th.classList.toggle('sort-asc',asc);th.classList.toggle('sort-desc',!asc);
      const tbody=tbl.querySelector('tbody');if(!tbody)return;
      [...tbody.querySelectorAll('tr')].sort((a,b)=>{
        const av=cn(a,ci),bv=cn(b,ci);
        return asc?(typeof av==='number'&&typeof bv==='number'?av-bv:String(av).localeCompare(String(bv)))
                  :(typeof av==='number'&&typeof bv==='number'?bv-av:String(bv).localeCompare(String(av)));
      }).forEach(r=>tbody.appendChild(r));
    });
  });
}
function cn(row,ci){const td=row.querySelectorAll('td')[ci];if(!td)return 0;const t=td.textContent.replace(/[,%+↑↓·—%]/g,'').trim();const n=parseFloat(t);return isNaN(n)?t:n;}
function autoSort(el){el?.querySelectorAll('table').forEach(makeSortable);}

// Multi-select setup (reusable per call)
function setupMS(btnId,ddId,allId,chkClass,applyId,clearId,onApply){
  const btn=$(btnId),dd=$(ddId);if(!btn||!dd)return;
  const wrap=btn.closest('.ms-wrap');
  btn.addEventListener('click',e=>{e.stopPropagation();dd.classList.toggle('open');});
  document.addEventListener('click',e=>{if(wrap&&!wrap.contains(e.target))dd.classList.remove('open');});
  dd.addEventListener('click',e=>e.stopPropagation());
  const allChk=$(allId);
  const chks=()=>[...document.querySelectorAll(chkClass)];
  allChk?.addEventListener('change',()=>{if(allChk.checked)chks().forEach(c=>c.checked=false);});
  document.querySelectorAll(chkClass).forEach(c=>c.addEventListener('change',()=>{if(allChk)allChk.checked=chks().every(c2=>!c2.checked);}));
  $(clearId)?.addEventListener('click',()=>{chks().forEach(c=>c.checked=false);if(allChk)allChk.checked=true;});
  $(applyId)?.addEventListener('click',()=>{
    const sel=chks().filter(c=>c.checked).map(c=>c.value);
    btn.textContent=sel.length===0?'All':sel.length===1?sel[0]:`${sel.length} selected`;
    dd.classList.remove('open');
    onApply(sel);
  });
}

// Percentile from sorted array
function percentile(sortedArr,p){
  if(!sortedArr.length)return null;
  const idx=(p/100)*(sortedArr.length-1);
  const lo=Math.floor(idx),hi=Math.ceil(idx);
  if(lo===hi)return sortedArr[lo];
  return sortedArr[lo]+(sortedArr[hi]-sortedArr[lo])*(idx-lo);
}
function avg(arr){if(!arr.length)return null;return arr.reduce((s,n)=>s+n,0)/arr.length;}

function populateCVStage(){

  [...stages].forEach(s=>{if(!orderedStages.includes(s))orderedStages.push(s);});
  const sel=$('cv-stage');if(!sel)return;const prev=CV.stageSel;

}
function renderCalls(){
  if(!CALLS)return;let recs=CALLS.records.filter(r=>r.cluster!=='Unknown');
  if(CV.sel.length>0)recs=recs.filter(r=>CV.sel.includes(r.lead_status));
  if(CV.stageSel!=='all')recs=recs.filter(r=>r.lead_stage===CV.stageSel);
  const byCluster={};let maxAttempts=0;
  recs.forEach(r=>{const c=r.cluster;if(!byCluster[c])byCluster[c]={total:0,updated_today:0,scheduled_today:0,overdue:0,by_attempts:{}};
    byCluster[c].total+=r.total;byCluster[c].updated_today+=r.updated_today;byCluster[c].scheduled_today+=r.scheduled_today;byCluster[c].overdue+=r.overdue;
    Object.entries(r.by_attempts||{}).forEach(([k,v])=>{const n=parseInt(k);byCluster[c].by_attempts[n]=(byCluster[c].by_attempts[n]||0)+v;if(n>maxAttempts)maxAttempts=n;});});
  const clusters=Object.keys(byCluster).filter(c=>byCluster[c].total>0).sort((a,b)=>byCluster[b].total-byCluster[a].total);
  const T={total:0,updated:0,scheduled:0,overdue:0};
  clusters.forEach(c=>{T.total+=byCluster[c].total;T.updated+=byCluster[c].updated_today;T.scheduled+=byCluster[c].scheduled_today;T.overdue+=byCluster[c].overdue;});
  $('cv-kpis').innerHTML=`<div class="kcard"><div class="kl">Total in bucket</div><div class="kv cb">${f(T.total)}</div><div class="ks">across ${clusters.length} clusters</div></div>

  renderDailyTbl(byCluster,clusters,T);renderAttemptsTbl(byCluster,clusters,maxAttempts);
}
function renderDailyTbl(byCluster,clusters,T){
  if(!clusters.length){$('cv-tbl-daily').innerHTML='<div class="nd">No data.</div>';return;}
  const maxOverdue=Math.max(...clusters.map(c=>byCluster[c].overdue),1);
  let html='<table><thead class="single"><tr><th>Cluster</th><th class="tdr">Overall Lead Count in Bucket</th><th class="tdr">Leads Updated Today</th><th class="tdr">Leads with Follow-up Scheduled Today</th><th class="tdr">Leads Overdue on Follow-up</th><th class="tdr">Overdue %</th></tr></thead><tbody>';
  clusters.forEach(c=>{const b=byCluster[c];const ovPct=b.total>0?(b.overdue/b.total*100):0;const ovCls=ovPct>50?'cell-bad':ovPct>25?'cell-warn':'';
    html+=`<tr><td class="tdc" title="${c}">${c}</td><td class="tdr mono">${f(b.total)}</td><td class="tdr mono ${b.updated_today>0?'cell-good':''}">${b.updated_today||'·'}</td><td class="tdr mono">${b.scheduled_today||'·'}</td><td class="tdr mono" style="${hBg(b.overdue,maxOverdue)}">${f(b.overdue)}</td><td class="tdr ${ovCls}">${ovPct.toFixed(1)}%</td></tr>`;});
  html+=`<tr style="background:var(--sur2);font-weight:600"><td>Total</td><td class="tdr mono">${f(T.total)}</td><td class="tdr mono">${f(T.updated)}</td><td class="tdr mono">${f(T.scheduled)}</td><td class="tdr mono">${f(T.overdue)}</td><td class="tdr">${T.total>0?(T.overdue/T.total*100).toFixed(1)+'%':'—'}</td></tr></tbody></table>`;
  const wrap=$('cv-tbl-daily');wrap.innerHTML=html;autoSort(wrap);
}
function renderAttemptsTbl(byCluster,clusters,maxAttempts){
  if(!clusters.length){$('cv-tbl-attempts').innerHTML='<div class="nd">No data.</div>';return;}
  const valid=[];for(let i=0;i<=Math.min(maxAttempts,20);i++){const sum=clusters.reduce((s,c)=>s+(byCluster[c].by_attempts[i]||0),0);if(sum>0)valid.push(i);}
  if(maxAttempts>20){const sum=clusters.reduce((s,c)=>{let t=0;Object.entries(byCluster[c].by_attempts).forEach(([k,v])=>{if(parseInt(k)>20)t+=v;});return s+t;},0);if(sum>0)valid.push('20+');}
  if(!valid.length){$('cv-tbl-attempts').innerHTML='<div class="nd">No attempt data.</div>';return;}
  let gMax=0;clusters.forEach(c=>valid.forEach(a=>{let v=0;if(a==='20+'){Object.entries(byCluster[c].by_attempts).forEach(([k,vv])=>{if(parseInt(k)>20)v+=vv;});}else{v=byCluster[c].by_attempts[a]||0;}if(v>gMax)gMax=v;}));
  let html=`<table><thead><tr><th rowspan="2">Cluster</th><th colspan="${valid.length}" style="background:#1e293b;color:#f1f5f9;text-align:center">Leads with N Call Attempts</th><th rowspan="2" class="tdr">Total</th></tr><tr>`;
  valid.forEach(a=>html+=`<th class="tdr">${a}</th>`);html+='</tr></thead><tbody>';
  clusters.forEach(c=>{let rt=0;let row=`<tr><td class="tdc" title="${c}">${c}</td>`;
    valid.forEach(a=>{let v=0;if(a==='20+'){Object.entries(byCluster[c].by_attempts).forEach(([k,vv])=>{if(parseInt(k)>20)v+=vv;});}else{v=byCluster[c].by_attempts[a]||0;}rt+=v;row+=`<td class="tdr mono" style="${hBg(v,gMax)}">${v||'·'}</td>`;});
    row+=`<td class="tdt">${f(rt)}</td></tr>`;html+=row;});
  html+='<tr style="background:var(--sur2);font-weight:600"><td>Total</td>';let gt=0;
  valid.forEach(a=>{let sum=0;clusters.forEach(c=>{if(a==='20+'){Object.entries(byCluster[c].by_attempts).forEach(([k,vv])=>{if(parseInt(k)>20)sum+=vv;});}else{sum+=byCluster[c].by_attempts[a]||0;}});gt+=sum;html+=`<td class="tdr mono">${f(sum)}</td>`;});
  html+=`<td class="tdt">${f(gt)}</td></tr></tbody></table>`;
  const wrap=$('cv-tbl-attempts');wrap.innerHTML=html;autoSort(wrap);
}

function populateMVStageFilter(){
  if(!MOVE)return;

  const fromField=MV.level==='stage'?'from_stage':'from_status';

  const fromSet=new Set(recs.map(r=>r[fromField]).filter(Boolean));
  const toSet  =new Set(recs.map(r=>r[toField]).filter(Boolean));
  const sortFn=MV.level==='stage'
    ? (a,b)=>{const orderAll=STATUS_ORDER.flatMap(s=>STATUS_STAGE_MAP[s]||[]);const ia=orderAll.findIndex(x=>x.toLowerCase()===a.toLowerCase());const ib=orderAll.findIndex(x=>x.toLowerCase()===b.toLowerCase());if(ia<0&&ib<0)return a.localeCompare(b);if(ia<0)return 1;if(ib<0)return -1;return ia-ib;}
    : (a,b)=>{const ia=STATUS_ORDER.indexOf(a),ib=STATUS_ORDER.indexOf(b);if(ia<0&&ib<0)return a.localeCompare(b);if(ia<0)return 1;if(ib<0)return -1;return ia-ib;};
  const fromList=[...fromSet].sort(sortFn);const toList=[...toSet].sort(sortFn);
  const fromSel=$('mv-from'),toSel=$('mv-toS');if(!fromSel||!toSel)return;

}

function renderMovement(){

function renderTransitions(dr,cl,lrm){
  const fromField=MV.level==='stage'?'from_stage':'from_status';
  const toField  =MV.level==='stage'?'to_stage':'to_status';
  const fromSel=$('mv-from')?.value||'all',toSel=$('mv-toS')?.value||'all';
  const allRecs=MV.level==='stage'?MOVE.stage:MOVE.status;
  let recs=filterByDate(allRecs,dr.from,dr.to);
  if(cl!=='all')recs=recs.filter(r=>r.cluster===cl);
  if(lrm!=='all')recs=recs.filter(r=>r.lrm===lrm);
  if(fromSel!=='all')recs=recs.filter(r=>r[fromField]===fromSel);
  if(toSel!=='all')recs=recs.filter(r=>r[toField]===toSel);

  const titleEl=$('mv-tbl-title'),subEl=$('mv-tbl-sub');
  if(titleEl)titleEl.textContent=`${MV.level==='stage'?'Stage':'Status'} transitions`;
  if(subEl)subEl.textContent='From → To · rows = Cluster × LRM · cells = transition count';

  // Pivot: rows = (cluster, lrm), cols = (from, to) combos
  const fromToPairs=new Set();const rowSet=new Set();const pivot={};
  recs.forEach(r=>{
    const ft=r[fromField]+'→'+r[toField];fromToPairs.add(ft);
    const rk=r.cluster+'|'+(r.lrm||'Unknown');rowSet.add(rk);
    pivot[rk]=pivot[rk]||{};pivot[rk][ft]=(pivot[rk][ft]||0)+r.count;
  });

  const T={transitions:0,unique_leads:'—',pairs:fromToPairs.size,clusters:new Set(),lrms:new Set()};
  recs.forEach(r=>{T.transitions+=r.count;T.clusters.add(r.cluster);if(r.lrm)T.lrms.add(r.lrm);});
  $('mv-kpis').innerHTML=`<div class="kcard"><div class="kl">Total Transitions</div><div class="kv cb">${f(T.transitions)}</div><div class="ks">${MV.level} level</div></div>
    <div class="kcard"><div class="kl">Unique From→To Pairs</div><div class="kv cp">${T.pairs}</div><div class="ks">in selected range</div></div>
    <div class="kcard"><div class="kl">Clusters</div><div class="kv ca">${T.clusters.size}</div><div class="ks">active</div></div>
    <div class="kcard"><div class="kl">LRMs</div><div class="kv cg">${T.lrms.size}</div><div class="ks">active</div></div>`;

  if(!recs.length){$('mv-tbl').innerHTML='<div class="nd">No transitions in selected range. Try widening filters or check that audit data exists.</div>';return;}

  // Build From→To pivot
  const pairs=[...fromToPairs];
  // group pairs by From
  const byFrom={};pairs.forEach(p=>{const[f,t]=p.split('→');byFrom[f]=byFrom[f]||[];byFrom[f].push(t);});
  const fromList=Object.keys(byFrom).sort();fromList.forEach(f=>byFrom[f].sort());
  // Roll up cluster rows: rows = cluster, then sub-rows per lrm
  const byCluster={};rowSet.forEach(rk=>{const[c,l]=rk.split('|');byCluster[c]=byCluster[c]||{};byCluster[c][l]=pivot[rk];});
  const clusters=Object.keys(byCluster).sort();

  // Max for heat
  const max=Math.max(...Object.values(pivot).flatMap(o=>Object.values(o)),1);

  let html='<table><thead>';
  // Row 1: From-stage headers spanning to-stages
  html+='<tr><th class="row-hdr" rowspan="2">Cluster / LRM</th>';
  fromList.forEach(f=>{html+=`<th colspan="${byFrom[f].length}" style="background:#1e293b;color:#f1f5f9">From: ${f}</th>`;});
  html+='<th class="row-hdr tdr" rowspan="2">Total</th></tr>';
  // Row 2: To-stage headers
  html+='<tr>';
  fromList.forEach(f=>byFrom[f].forEach(t=>{html+=`<th class="tdr" title="From ${f} → To ${t}">→ ${t}</th>`;}));
  html+='</tr></thead><tbody>';

  clusters.forEach(c=>{
    const lrmsInCluster=Object.keys(byCluster[c]).sort();
    const clusterTotals={};let clusterGrand=0;
    lrmsInCluster.forEach(l=>Object.entries(byCluster[c][l]).forEach(([p,v])=>{clusterTotals[p]=(clusterTotals[p]||0)+v;clusterGrand+=v;}));
    // Cluster header row
    html+=`<tr style="background:#f1f5f9;font-weight:600"><td class="tdc">${c}</td>`;

function renderEOD(dr,cl,lrm){

  const dimField=MV.level==='stage'?'stage':'status';

  if(titleEl)titleEl.textContent=`End-of-day position`;
  if(subEl)subEl.textContent=`Each lead's last ${MV.level} on selected day · one record per lead per day`;

  // KPIs
  const total=recs.reduce((s,r)=>s+r.count,0);
  const dates=new Set(recs.map(r=>r.date));
  const clusters=new Set(recs.map(r=>r.cluster));
  const lrms=new Set(recs.map(r=>r.lrm).filter(l=>l&&l!=='Unknown'));
  $('mv-kpis').innerHTML=`<div class="kcard"><div class="kl">Total Lead-Days</div><div class="kv cb">${f(total)}</div><div class="ks">across ${dates.size} day(s)</div></div>
    <div class="kcard"><div class="kl">Days Covered</div><div class="kv cp">${dates.size}</div><div class="ks">in selected range</div></div>
    <div class="kcard"><div class="kl">Clusters</div><div class="kv ca">${clusters.size}</div></div>
    <div class="kcard"><div class="kl">LRMs</div><div class="kv cg">${lrms.size}</div></div>`;

  if(!recs.length){$('mv-tbl').innerHTML='<div class="nd">No EOD data in selected range.</div>';return;}

  // Pivot: rows = (cluster, lrm), cols = dim values
  const dimSet=new Set();const rowSet=new Set();const pivot={};
  recs.forEach(r=>{const v=r[dimField]||'Unknown';dimSet.add(v);const rk=r.cluster+'|'+(r.lrm||'Unknown');rowSet.add(rk);
    pivot[rk]=pivot[rk]||{};pivot[rk][v]=(pivot[rk][v]||0)+r.count;});
  // Sort dims: stage uses status order, status uses STATUS_ORDER
  const dimList=[...dimSet];
  if(MV.level==='stage'){const orderAll=STATUS_ORDER.flatMap(s=>STATUS_STAGE_MAP[s]||[]);dimList.sort((a,b)=>{const ia=orderAll.findIndex(x=>x.toLowerCase()===a.toLowerCase());const ib=orderAll.findIndex(x=>x.toLowerCase()===b.toLowerCase());if(ia<0&&ib<0)return a.localeCompare(b);if(ia<0)return 1;if(ib<0)return -1;return ia-ib;});}
  else{dimList.sort((a,b)=>{const ia=STATUS_ORDER.indexOf(a),ib=STATUS_ORDER.indexOf(b);if(ia<0&&ib<0)return a.localeCompare(b);if(ia<0)return 1;if(ib<0)return -1;return ia-ib;});}

  const byCluster={};rowSet.forEach(rk=>{const[c,l]=rk.split('|');byCluster[c]=byCluster[c]||{};byCluster[c][l]=pivot[rk];});
  const clustersArr=Object.keys(byCluster).sort();
  const max=Math.max(...Object.values(pivot).flatMap(o=>Object.values(o)),1);

  let html='<table><thead class="single"><tr><th>Cluster / LRM</th>';
  dimList.forEach(d=>html+=`<th class="tdr" title="${d}">${d}</th>`);
  html+='<th class="tdr">Total</th></tr></thead><tbody>';
  clustersArr.forEach(c=>{
    const lrmsHere=Object.keys(byCluster[c]).sort();
    const clusterTotals={};let cg=0;
    lrmsHere.forEach(l=>Object.entries(byCluster[c][l]).forEach(([d,v])=>{clusterTotals[d]=(clusterTotals[d]||0)+v;cg+=v;}));
    html+=`<tr style="background:#f1f5f9;font-weight:600"><td class="tdc">${c}</td>`;
    dimList.forEach(d=>{const v=clusterTotals[d]||0;html+=`<td class="tdr mono">${v||'·'}</td>`;});
    html+=`<td class="tdt">${f(cg)}</td></tr>`;
    lrmsHere.forEach(l=>{const row=byCluster[c][l];let rt=0;
      html+=`<tr><td class="td-lrm" title="${l}">${l}</td>`;
      dimList.forEach(d=>{const v=row[d]||0;rt+=v;html+=`<td class="tdr mono" style="${hBg(v,max)}">${v||'·'}</td>`;});
      html+=`<td class="tdr" style="font-weight:600">${f(rt)}</td></tr>`;
    });
  });
  html+='</tbody></table>';
  $('mv-tbl').innerHTML=html;autoSort($('mv-tbl'));
}

function renderLRM(){
  if(!LRM_DATA)return;
  const dr=getDR('lr-pr','lr-fr','lr-to');const cl=$('lr-cl')?.value;
  let recs=filterByDate(LRM_DATA.records,dr.from,dr.to);
  if(cl!=='all')recs=recs.filter(r=>r.cluster===cl);

  // Roll up: per LRM and per Cluster
  const byLRM={};const byCluster={};const T={calls:0,leads:0,stage:0,status:0};
  recs.forEach(r=>{
    const lk=r.cluster+'|'+r.lrm;
    if(!byLRM[lk])byLRM[lk]={cluster:r.cluster,lrm:r.lrm,calls:0,leads_touched:0,stage_movements:0,status_movements:0};
    byLRM[lk].calls+=r.calls;byLRM[lk].leads_touched+=r.leads_touched;
    byLRM[lk].stage_movements+=r.stage_movements;byLRM[lk].status_movements+=r.status_movements;
    if(!byCluster[r.cluster])byCluster[r.cluster]={calls:0,leads:0,stage:0,status:0,lrms:new Set()};
    byCluster[r.cluster].calls+=r.calls;byCluster[r.cluster].leads+=r.leads_touched;
    byCluster[r.cluster].stage+=r.stage_movements;byCluster[r.cluster].status+=r.status_movements;
    byCluster[r.cluster].lrms.add(r.lrm);
    T.calls+=r.calls;T.leads+=r.leads_touched;T.stage+=r.stage_movements;T.status+=r.status_movements;
  });

  $('lr-kpis').innerHTML=`<div class="kcard"><div class="kl">Total Calls</div><div class="kv cb">${f(T.calls)}</div><div class="ks">attempts logged</div></div>
    <div class="kcard"><div class="kl">Leads Touched</div><div class="kv cg">${f(T.leads)}</div><div class="ks">distinct leads</div></div>
    <div class="kcard"><div class="kl">Stage Movements</div><div class="kv ca">${f(T.stage)}</div><div class="ks">${T.calls>0?(T.stage/T.calls*100).toFixed(1):0}% of calls</div></div>
    <div class="kcard"><div class="kl">Status Movements</div><div class="kv cp">${f(T.status)}</div><div class="ks">${T.calls>0?(T.status/T.calls*100).toFixed(1):0}% of calls</div></div>`;

  // Cluster summary table
  const clusters=Object.keys(byCluster).sort((a,b)=>byCluster[b].calls-byCluster[a].calls);
  if(!clusters.length){$('lr-cluster-tbl').innerHTML='<div class="nd">No data.</div>';$('lr-lrm-tbl').innerHTML='';return;}
  const maxC=Math.max(...clusters.map(c=>byCluster[c].calls),1);
  let html='<table><thead class="single"><tr><th>Cluster</th><th class="tdr">LRMs Active</th><th class="tdr">Calls</th><th class="tdr">Leads Touched</th><th class="tdr">Avg Calls / LRM</th><th class="tdr">Stage Movements</th><th class="tdr">Status Movements</th></tr></thead><tbody>';
  clusters.forEach(c=>{const b=byCluster[c];const avg=b.lrms.size>0?b.calls/b.lrms.size:0;
    html+=`<tr><td class="tdc">${c}</td><td class="tdr mono">${b.lrms.size}</td><td class="tdr mono" style="${hBg(b.calls,maxC)}">${f(b.calls)}</td><td class="tdr mono">${f(b.leads)}</td><td class="tdr mono">${fdec(avg,1)}</td><td class="tdr mono">${f(b.stage)}</td><td class="tdr mono">${f(b.status)}</td></tr>`;});
  html+=`<tr style="background:var(--sur2);font-weight:600"><td>Total</td><td class="tdr mono">${[...new Set(recs.map(r=>r.lrm))].filter(l=>l&&l!=='Unknown').length}</td><td class="tdr mono">${f(T.calls)}</td><td class="tdr mono">${f(T.leads)}</td><td class="tdr mono">—</td><td class="tdr mono">${f(T.stage)}</td><td class="tdr mono">${f(T.status)}</td></tr></tbody></table>`;
  $('lr-cluster-tbl').innerHTML=html;autoSort($('lr-cluster-tbl'));

  // Per-LRM table grouped by cluster
  const lrmList=Object.values(byLRM).sort((a,b)=>{const cc=a.cluster.localeCompare(b.cluster);return cc!==0?cc:b.calls-a.calls;});
  const maxL=Math.max(...lrmList.map(r=>r.calls),1);
  let h2='<table><thead class="single"><tr><th>Cluster</th><th>LRM</th><th class="tdr">Calls</th><th class="tdr">Leads Touched</th><th class="tdr">Stage Movements</th><th class="tdr">Status Movements</th><th class="tdr">Calls / Lead</th></tr></thead><tbody>';
  let curC=null;
  lrmList.forEach(r=>{
    const cpl=r.leads_touched>0?r.calls/r.leads_touched:0;
    const clusterCell=r.cluster!==curC?`<td class="tdc" style="font-weight:600;background:#f1f5f9">${r.cluster}</td>`:'<td style="background:#fafafa"></td>';
    curC=r.cluster;
    h2+=`<tr>${clusterCell}<td class="td-lrm" style="padding-left:8px" title="${r.lrm}">${r.lrm}</td><td class="tdr mono" style="${hBg(r.calls,maxL)}">${f(r.calls)}</td><td class="tdr mono">${f(r.leads_touched)}</td><td class="tdr mono">${f(r.stage_movements)}</td><td class="tdr mono">${f(r.status_movements)}</td><td class="tdr mono">${fdec(cpl,1)}</td></tr>`;
  });
  h2+='</tbody></table>';
  $('lr-lrm-tbl').innerHTML=h2;autoSort($('lr-lrm-tbl'));
}

function renderTAT(){
  if(!TAT_DATA)return;
  const metric=$('tat-metric').value;
  const dr=getDR('tat-pr','tat-fr','tat-to');
  const cl=$('tat-cl').value;
  const byLRM=$('tat-bylrm-tgl')?.querySelector('.tgl-b.on')?.dataset.v==='1';
  const pcSel=$('tat-pctile').value;
  const pcVal=pcSel==='custom'?parseInt($('tat-pctile-custom').value)||80:parseInt(pcSel);

  // Filter records
  let recs=TAT_DATA.records;
  if(cl!=='all')recs=recs.filter(r=>r.cluster===cl);
  if(dr.from||dr.to){
    recs=recs.filter(r=>{if(!r.creation_date)return false;const cd=new Date(r.creation_date+'T00:00:00');if(dr.from&&cd<dr.from)return false;if(dr.to&&cd>dr.to)return false;return true;});
  }

  // Extract values for the chosen metric
  function getValues(records){
    if(metric==='tat_gaps'){const all=[];records.forEach(r=>{(r.tat_gaps||[]).forEach(g=>all.push(g));});return all;}
    return records.map(r=>r[metric]).filter(v=>v!=null&&!isNaN(v));
  }

  const allVals=getValues(recs).sort((a,b)=>a-b);
  const N=allVals.length;
  const avgAll=avg(allVals);
  const p50=percentile(allVals,50);
  const pcCust=percentile(allVals,pcVal);

  $('tat-kpis').innerHTML=`<div class="kcard"><div class="kl">Sample Size</div><div class="kv cb">${f(N)}</div><div class="ks">data points</div></div>
    <div class="kcard"><div class="kl">Average</div><div class="kv ca">${avgAll!=null?fdec(avgAll,1)+'d':'—'}</div><div class="ks">${metric==='tat_gaps'?'gap':'TAT'} days</div></div>
    <div class="kcard"><div class="kl">P50 (Median)</div><div class="kv cg">${p50!=null?fdec(p50,1)+'d':'—'}</div><div class="ks">50th percentile</div></div>
    <div class="kcard"><div class="kl">P${pcVal}</div><div class="kv cp">${pcCust!=null?fdec(pcCust,1)+'d':'—'}</div><div class="ks">${pcVal}th percentile</div></div>`;

  // Group by cluster (and optionally LRM)
  const groupKey=byLRM?(r=>r.cluster+'|'+(r.lrm||'Unknown')):(r=>r.cluster);
  const groups={};
  recs.forEach(r=>{const k=groupKey(r);if(!groups[k])groups[k]={key:k,records:[]};groups[k].records.push(r);});

  const titleEl=$('tat-tbl-title'),subEl=$('tat-tbl-sub');
  const metricLabel={'tat_first_call':'Creation → First Call','tat_gaps':'Between consecutive calls','tat_to_meeting':'Creation → First Meeting','tat_to_booked':'Creation → First Booking','tat_to_won':'Creation → Order Confirmed'}[metric];
  if(titleEl)titleEl.textContent=`TAT: ${metricLabel}`;
  if(subEl)subEl.textContent=`Calendar days · P${pcVal} custom percentile · ${byLRM?'by Cluster × LRM':'by Cluster'}`;

  if(!recs.length||!N){$('tat-tbl').innerHTML='<div class="nd">No data for selected filters & metric.</div>';return;}

  // Build rows
  const rows=Object.values(groups).map(g=>{
    const vals=getValues(g.records).sort((a,b)=>a-b);
    return {
      key: g.key,
      n:   vals.length,
      avg: avg(vals),
      p50: percentile(vals,50),
      p75: percentile(vals,75),
      p90: percentile(vals,90),
      pc:  percentile(vals,pcVal),
    };
  }).filter(r=>r.n>0).sort((a,b)=>b.n-a.n);

  let html='<table><thead class="single"><tr>';
  if(byLRM){html+='<th>Cluster</th><th>LRM</th>';}else{html+='<th>Cluster</th>';}
  html+=`<th class="tdr">Sample N</th><th class="tdr">Avg (days)</th><th class="tdr">P50</th><th class="tdr">P75</th><th class="tdr">P90</th><th class="tdr">P${pcVal} (custom)</th></tr></thead><tbody>`;
  rows.forEach(r=>{
    const[c,l]=r.key.split('|');
    if(byLRM){html+=`<tr><td class="tdc" title="${c}">${c}</td><td class="td-lrm" style="padding-left:8px" title="${l}">${l}</td>`;}
    else{html+=`<tr><td class="tdc" title="${r.key}">${r.key}</td>`;}
    html+=`<td class="tdr mono">${f(r.n)}</td><td class="tdr mono">${fdec(r.avg,1)}</td><td class="tdr mono">${fdec(r.p50,1)}</td><td class="tdr mono">${fdec(r.p75,1)}</td><td class="tdr mono">${fdec(r.p90,1)}</td><td class="tdr mono" style="font-weight:600;background:#fef3c7">${fdec(r.pc,1)}</td></tr>`;
  });
  // Overall row
  html+=`<tr style="background:var(--sur2);font-weight:600">${byLRM?'<td colspan="2">Overall</td>':'<td>Overall</td>'}<td class="tdr mono">${f(N)}</td><td class="tdr mono">${fdec(avgAll,1)}</td><td class="tdr mono">${fdec(p50,1)}</td><td class="tdr mono">${fdec(percentile(allVals,75),1)}</td><td class="tdr mono">${fdec(percentile(allVals,90),1)}</td><td class="tdr mono">${fdec(pcCust,1)}</td></tr>`;
  html+='</tbody></table>';
  $('tat-tbl').innerHTML=html;autoSort($('tat-tbl'));
}

// ════════════════════════════════════════════════════════════════════════════
// FUNNEL + COHORT (existing, kept as-is)
// ════════════════════════════════════════════════════════════════════════════
function bFunnel(){
  const clusterSet=new Set();DATA.records.forEach(r=>{if(r.cluster&&r.cluster!=='Unknown')clusterSet.add(r.cluster);});
  const clusterList=[...clusterSet].sort();
  const presentSt=new Set(DATA.records.map(r=>r.lead_status).filter(Boolean));
  const activeStatuses=[...STATUS_ORDER.filter(s=>presentSt.has(s)),...[...presentSt].filter(s=>s&&s!=='Unknown'&&!STATUS_ORDER.includes(s))];
  $('p-funnel').innerHTML=`<div class="fb"><div class="fr">
    <div class="fg"><span class="flbl">Cluster</span><select class="fc" id="fn-cl"><option value="all">All Clusters</option>${clusterList.map(c=>`<option value="${c}">${c}</option>`).join('')}</select></div>
    <div class="fg"><span class="flbl">Status</span>
      <div class="ms-wrap" id="fn-ms-wrap"><button class="ms-btn" id="fn-ms-btn">All Statuses</button>
        <div class="ms-dd" id="fn-ms-dd"><div class="ms-list"><label class="ms-opt"><input type="checkbox" id="fn-ms-all" checked>&nbsp;All Statuses</label><div class="ms-sep"></div>
          ${activeStatuses.map(s=>`<label class="ms-opt"><input type="checkbox" class="fn-ms-chk" value="${s}"><span class="ms-dot" style="background:${STATUS_COLORS[s]||'#94a3b8'}"></span>${s}</label>`).join('')}
        </div><div class="ms-foot"><button class="ms-clear" id="fn-ms-clr">Clear</button><button class="ms-apply" id="fn-ms-apl">Apply</button></div></div></div></div>
    <div class="fg"><span class="flbl">Date range <span class="sub">(lead creation)</span></span>
      <div class="frow"><select class="fc" id="fn-pr"><option value="last30">Last 30 days</option><option value="alltime">All time</option><option value="thismonth">This month</option><option value="lastmonth">Last month</option><option value="last3mo">Last 3 months</option><option value="custom">Custom</option></select><input type="date" class="fc" id="fn-fr"><input type="date" class="fc" id="fn-to"></div></div>
  </div></div>
  <div class="sc"><div class="sc-h"><span class="sc-t" id="fn-title">Stage funnel</span><span class="sc-hi">Stages grouped by status</span></div><div class="sc-b" id="fn-body"></div></div>`;
  setupMS('fn-ms-btn','fn-ms-dd','fn-ms-all','.fn-ms-chk','fn-ms-apl','fn-ms-clr',sel=>{FN.sel=sel;render();});
  function render(){
    const dr=getDR('fn-pr','fn-fr','fn-to');let recs=filterDR(DATA.records,dr.from,dr.to);
    const cl=$('fn-cl')?.value;if(cl&&cl!=='all')recs=recs.filter(r=>r.cluster===cl);
    if(FN.sel.length>0)recs=recs.filter(r=>FN.sel.includes(r.lead_status));
    const total=recs.reduce((s,r)=>s+r.lead_count,0);
    const dimT={};recs.forEach(r=>{dimT[r.lead_stage]=(dimT[r.lead_stage]||0)+r.lead_count;});
    const groups=stageGroups(dimT,FN.sel);const colors=buildColors(groups);
    const body=$('fn-body');if(!body)return;
    const title=$('fn-title');if(title)title.textContent=FN.sel.length===0?'Stage funnel — all statuses':FN.sel.length===1?`Stage funnel — ${FN.sel[0]}`:`Stage funnel — ${FN.sel.length} statuses`;
    if(!groups.length||!total){body.innerHTML='<div class="nd">No data for selected filters.</div>';return;}
    const maxN=Math.max(...groups.flatMap(g=>g.stages.map(s=>dimT[s]||0)),1);
    body.innerHTML=groups.map(({status,stages})=>{
      const sTot=stages.reduce((s,st)=>s+(dimT[st]||0),0);const sCol=STATUS_COLORS[status]||'#94a3b8';const sBg=STATUS_BG[status]||'#f8fafc';
      const bars=stages.filter(s=>(dimT[s]||0)>0).map(s=>{const n=dimT[s]||0,w=((n/maxN)*100).toFixed(1);const col=colors[s]||sCol;
        return`<div style="display:grid;grid-template-columns:200px 1fr 44px 60px;align-items:center;gap:8px;margin-bottom:4px">
          <div style="font-size:11px;color:var(--t2);text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:6px" title="${s}">${s}</div>
          <div style="background:var(--sur2);border-radius:4px;height:18px;overflow:hidden"><div style="width:${w}%;height:100%;background:${col};border-radius:4px;display:flex;align-items:center;padding-left:7px"><span style="font-size:10px;font-weight:600;color:#fff;white-space:nowrap">${n>maxN*.1?f(n):''}</span></div></div>
          <div style="font-size:10px;color:var(--t3);text-align:right">${total>0?((n/total)*100).toFixed(1):0}%</div>
          <div class="mono" style="font-size:11px;text-align:right">${f(n)}</div></div>`;}).join('');
      return`<div style="margin-bottom:14px"><div style="display:flex;align-items:center;justify-content:space-between;background:${sBg};color:${sCol};padding:6px 10px;border-radius:6px;margin-bottom:6px;border-left:3px solid ${sCol}"><span style="font-size:11px;font-weight:600">${status}</span><span style="font-size:11px;font-family:'DM Mono',monospace">${f(sTot)} leads · ${total>0?((sTot/total)*100).toFixed(1):0}%</span></div>${bars}</div>`;
    }).join('');
  }
  ['fn-cl','fn-pr'].forEach(id=>$(id)?.addEventListener('change',render));
  ['fn-fr','fn-to'].forEach(id=>$(id)?.addEventListener('change',()=>{$('fn-pr').value='custom';render();}));
  setTimeout(render,0);
}

function bCohort(){
  const clusterSet=new Set();DATA.records.forEach(r=>{if(r.cluster&&r.cluster!=='Unknown')clusterSet.add(r.cluster);});
  const clusterList=[...clusterSet].sort();
  const presentSt=new Set(DATA.records.map(r=>r.lead_status).filter(Boolean));
  const activeStatuses=STATUS_ORDER.filter(s=>presentSt.has(s));
  $('p-cohort').innerHTML=`<div class="fb"><div class="fr">
    <div class="fg"><span class="flbl">Cluster</span><select class="fc" id="co-cl"><option value="all">All Clusters</option>${clusterList.map(c=>`<option>${c}</option>`).join('')}</select></div>
    <div class="fg"><span class="flbl">Status</span><select class="fc" id="co-st"><option value="all">All Statuses</option>${activeStatuses.map(s=>`<option value="${s}">${s}</option>`).join('')}</select></div>
    <div class="fg"><span class="flbl">Date range <span class="sub">(lead creation)</span></span><div class="frow"><select class="fc" id="co-pr"><option value="last3mo">Last 3 months</option><option value="last30">Last 30 days</option><option value="thisyear">This year</option><option value="alltime">All time</option><option value="custom">Custom</option></select><input type="date" class="fc" id="co-fr"><input type="date" class="fc" id="co-to"></div></div>
  </div></div>
  <div class="sc"><div class="sc-h"><span class="sc-t">Cohort week × Stage</span><span class="sc-hi">Rows = creation week · top 12 stages</span></div><div style="overflow-x:auto;max-height:440px;overflow-y:auto"><div class="tw" id="co-tbl"></div></div></div>`;
  function render(){
    const dr=getDR('co-pr','co-fr','co-to');let recs=filterDR(DATA.records,dr.from,dr.to);
    const cl=$('co-cl')?.value,st=$('co-st')?.value;
    if(cl&&cl!=='all')recs=recs.filter(r=>r.cluster===cl);if(st&&st!=='all')recs=recs.filter(r=>r.lead_status===st);
    const weeks=[...new Set(recs.map(r=>r.cohort_week).filter(w=>w&&w!=='Unknown'))].sort().reverse();
    const dimT={};recs.forEach(r=>{dimT[r.lead_stage]=(dimT[r.lead_stage]||0)+r.lead_count;});
    const groups=stageGroups(dimT,st&&st!=='all'?[st]:[]);
    const topStages=groups.flatMap(g=>g.stages).slice(0,12);
    if(!weeks.length){$('co-tbl').innerHTML='<div class="nd">No data for selected filters.</div>';return;}
    const pv={};recs.forEach(r=>{if(!weeks.includes(r.cohort_week))return;pv[r.cohort_week]=pv[r.cohort_week]||{};pv[r.cohort_week][r.lead_stage]=(pv[r.cohort_week][r.lead_stage]||0)+r.lead_count;});
    let html='<table><thead class="single"><tr><th>Week of (creation)</th>';topStages.forEach(s=>html+=`<th class="tdr" title="${s}">${s}</th>`);html+='<th class="tdr">Total</th></tr></thead><tbody>';
    weeks.forEach(w=>{const wt=topStages.reduce((s,st2)=>s+(pv[w]?.[st2]||0),0);const wmax=Math.max(...topStages.map(s=>pv[w]?.[s]||0),1);
      html+=`<tr><td class="mono tdc" style="font-size:11px">${fmtNice(w)}</td>`;topStages.forEach(s=>{const v=pv[w]?.[s]||0;html+=`<td class="tdr mono" style="${hBg(v,wmax)}">${v||'·'}</td>`;});html+=`<td class="tdt">${f(wt)}</td></tr>`;});
    html+='</tbody></table>';const wrap=$('co-tbl');wrap.innerHTML=html;autoSort(wrap);
  }
  ['co-cl','co-st','co-pr'].forEach(id=>$(id)?.addEventListener('change',render));
  ['co-fr','co-to'].forEach(id=>$(id)?.addEventListener('change',()=>{$('co-pr').value='custom';render();}));
  setTimeout(render,0);
}

loadData();
</script>
