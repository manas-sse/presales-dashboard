name: ETL Pipeline

on:
  schedule:
    - cron: '0 2,5,8,11,14 * * 1-6'
  workflow_dispatch:

jobs:
  run-etl:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install requests python-dotenv

      - name: Run ETL
        env:
          METABASE_URL:      ${{ secrets.METABASE_URL }}
          METABASE_USERNAME: ${{ secrets.METABASE_USERNAME }}
          METABASE_PASSWORD: ${{ secrets.METABASE_PASSWORD }}
          METABASE_CARD_ID:  2557
        run: python etl.py

      - name: Commit data if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet && echo "No changes." || (git commit -m "data: refresh [skip ci]" && git push)